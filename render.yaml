services:
  - type: web
    name: premier-property-hub
    runtime: docker
    plan: free
    healthCheckPath: /Admin
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: premier-property-hub-db
          property: connectionString

databases:
  - name: premier-property-hub-db
    plan: free
    databaseName: premier_property_hub
    user: premier
